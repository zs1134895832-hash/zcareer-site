<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Z Career
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#071428,
#0B2344
);

font-family:
Inter,
Arial;

color:white;

}

html{
scroll-behavior:smooth;
}

nav{

position:fixed;

top:0;

width:100%;

padding:24px 80px;

display:flex;

justify-content:
space-between;

background:
rgba(
7,
20,
40,
.92
);

backdrop-filter:
blur(10px);

z-index:999;

}

.logo{

font-size:34px;

font-weight:800;

color:#D8B56A;

}

nav a{

margin-left:30px;

color:white;

text-decoration:none;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

}

.hero h1{

font-size:82px;

line-height:1.1;

}

.hero p{

margin-top:30px;

font-size:22px;

color:#C7D4E5;

max-width:900px;

}

.btn{

margin-top:40px;

padding:18px 36px;

border:none;

border-radius:14px;

font-size:18px;

cursor:pointer;

background:#D8B56A;

}

.section{

padding:120px 80px;

}

.title{

text-align:center;

font-size:48px;

margin-bottom:60px;

color:#D8B56A;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
280px,
1fr
));

gap:30px;

}

.card{

background:
rgba(
255,
255,
255,
0.05
);

backdrop-filter:
blur(18px);

padding:40px;

border-radius:24px;

}

.big{

font-size:54px;

color:#D8B56A;

}

.case{

height:320px;

border-radius:24px;

overflow:hidden;

background:
linear-gradient(
135deg,
#163257,
#0D1830
);

display:flex;

align-items:end;

padding:30px;

}

.about{

max-width:900px;

margin:auto;

text-align:center;

font-size:20px;

color:#d5dce5;

}

.form{

max-width:700px;

margin:auto;

}

input,
textarea{

width:100%;

padding:18px;

border:none;

border-radius:12px;

margin-bottom:18px;

}

.submit{

width:100%;

padding:20px;

background:#D8B56A;

border:none;

font-size:18px;

}

.chat{

position:fixed;

right:30px;

bottom:30px;

padding:18px;

background:#D8B56A;

color:#071428;

border-radius:999px;

font-weight:700;

}

.footer{

padding:80px;

text-align:center;

color:#8FA3BB;

}

@media(
max-width:768px
){

nav{

padding:18px;

}

.hero h1{

font-size:44px;

}

.section{

padding:80px 24px;

}

}

</style>

</head>

<body>

</body>

</html>
